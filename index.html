<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Lucky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a472a 0%, #2d5a3d 50%, #3d7a52 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200"><defs><pattern id="ocean" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse"><path d="M0,100 Q50,80 100,100 T200,100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/><text x="80" y="60" font-size="40" fill="rgba(255,255,255,0.15)">🐚</text><text x="20" y="120" font-size="35" fill="rgba(255,255,255,0.1)">🦀</text><text x="150" y="40" font-size="38" fill="rgba(255,255,255,0.12)">🐠</text></pattern></defs><rect width="1200" height="200" fill="url(%23ocean)"/></svg>');
            background-size: 400px 200px;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(26, 71, 42, 0.8) 0%, rgba(45, 90, 61, 0.8) 50%, rgba(61, 122, 82, 0.8) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .header-content {
            flex: 1;
            text-align: center;
            position: relative;
            z-index: 2;
            min-width: 300px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header h1:hover {
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.4);
        }

        .header h1 input {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
            width: 90%;
            text-align: center;
        }

        .header h1 input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 2;
        }

        .about-link {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            border: 2px solid white;
            transition: all 0.3s ease;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .about-link:hover {
            background: white;
            color: #1a472a;
            transform: scale(1.05);
        }

        .content {
            padding: 40px 20px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .month-page {
            display: none;
        }

        .month-page.active {
            display: block;
        }

        .month-calendar {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .month-calendar h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            border: none;
            padding: 0;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .weekday {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            font-size: 1em;
            padding: 12px;
            background: white;
            border-radius: 8px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            padding: 8px;
            text-align: center;
            font-size: 0.9em;
        }

        .day:hover {
            background: #e3f2fd;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .day.today {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .day.today .day-number {
            color: white;
            font-weight: bold;
        }

        .day-number {
            font-size: 0.75em;
            color: #999;
            margin-top: 4px;
            transition: all 0.3s ease;
        }

        .emoji {
            font-size: 2.2em;
        }

        .day.empty {
            cursor: default;
            background: transparent;
            border: none;
        }

        .day.empty:hover {
            background: transparent;
            transform: none;
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .nav-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .nav-button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .month-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .month-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .month-btn.active {
            background: #667eea;
            color: white;
        }

        .month-btn:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }

        .notes-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .note {
            background: white;
            border-left: 5px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .note:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .note h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .note p {
            color: #555;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .note textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .note textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            background: #764ba2;
        }

        /* Sidebar Styles */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-widget {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .sidebar-widget h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        /* Motivational Speech Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .modal-content p {
            color: #555;
            line-height: 1.8;
            margin-bottom: 15px;
            font-size: 1.05em;
        }

        .close-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #764ba2;
        }

        /* Amazon Music Link */
        .amazon-music-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: linear-gradient(135deg, #FF9900 0%, #FF6B35 100%);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1.05em;
            text-align: center;
        }

        .amazon-music-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.4);
        }

        .amazon-icon {
            font-size: 1.5em;
        }

        /* Daily Positive Notes */
        .daily-notes-widget {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .daily-notes-widget h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .today-date {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .daily-quote {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 0.95em;
            font-style: italic;
            text-align: center;
        }

        .saved-notes-list {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .saved-note-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 0.9em;
            color: #555;
            border-left: 3px solid #667eea;
        }

        .about-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
        }

        .about-modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-modal-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .close-about-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
            transition: color 0.3s ease;
        }

        .close-about-btn:hover {
            color: #667eea;
        }

        .about-modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .about-modal-content textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            font-size: 1em;
        }

        .about-modal-content textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .about-save-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .about-save-btn:hover {
            background: #764ba2;
        }

        .about-display {
            color: #555;
            line-height: 1.8;
            font-size: 1em;
        }

        @media (max-width: 1200px) {
            .main-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-column: 1;
                grid-row: 2;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .sidebar-widget {
                flex: 1;
                min-width: 250px;
            }

            .notes-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .header h1 {
                font-size: 2em;
            }

            .month-calendar {
                padding: 20px;
            }

            .content {
                padding: 20px;
            }

            .month-selector {
                gap: 5px;
            }

            .month-btn {
                padding: 8px 12px;
                font-size: 0.8em;
            }

            .sidebar {
                flex-direction: column;
            }

            .modal-content {
                margin: 20px;
                padding: 30px 20px;
            }

            .notes-section {
                grid-template-columns: 1fr;
                padding: 20px;
            }
        }
    </style>
</head>

                    <div class="month-selector" id="monthSelector"></div>

                    <!-- Calendar Pages -->
                    <div id="calendarPages"></div>

                    <!-- Navigation Buttons -->
                    <div class="navigation">
                        <button class="nav-button" id="prevBtn" onclick="previousMonth()">← Previous</button>

            <div id="speechContent"></div>
            <button class="close-btn" onclick="closeMotivational()">Got It! Let's Go</button>

    </div>

            <button class="about-save-btn" id="aboutSaveBtn" style="display: none;" onclick="saveAbout()">Save</button>
        </div>

        function getStoredData() {
            const stored = localStorage.getItem('luckyData');
            return stored ? JSON.parse(stored) : { tasks: {}, notes: {}, dailyNotes: {}, title: "Lucky's Space", about: "" };
        }

        function saveAllData(data) {
            localStorage.setItem('luckyData', JSON.stringify(data));
        }

        function getRandomEmoji() {
            return beachEmojis[Math.floor(Math.random() * beachEmojis.length)];
        }

        function getRandomSpeech() {
            return motivationalSpeeches[Math.floor(Math.random() * motivationalSpeeches.length)];
        }

        function getRandomQuote() {
            return dailyMotivationQuotes[Math.floor(Math.random() * dailyMotivationQuotes.length)];
        }

        // Title Editing
        function editTitle() {
            const titleDisplay = document.getElementById('titleDisplay');
            const titleInput = document.getElementById('titleInput');
            titleDisplay.style.display = 'none';
            titleInput.style.display = 'block';
            titleInput.focus();

            function saveTitle() {
                const newTitle = titleInput.value || "Lucky's Space";
                titleDisplay.textContent = newTitle;
                titleDisplay.style.display = 'block';
                titleInput.style.display = 'none';
                const data = getStoredData();
                data.title = newTitle;
                saveAllData(data);
                updateCalendarTitle();
            }

            titleInput.onblur = saveTitle;
            titleInput.onkeypress = (e) => {
                if (e.key === 'Enter') saveTitle();
            };
        }

        function updateCalendarTitle() {
            const data = getStoredData();
            document.getElementById('calendarTitle').textContent = `My ${currentYear} Calendar`;
        }

        // Show motivational modal
        function showMotivational() {
            const modal = document.getElementById('motivationalModal');
            const speechContent = document.getElementById('speechContent');
            const speech = getRandomSpeech();
            speechContent.innerHTML = `<p>${speech}</p>`;
            modal.classList.add('show');
        }

        // Close motivational modal
        function closeMotivational() {
            const modal = document.getElementById('motivationalModal');
            modal.classList.remove('show');
        }

        // About Modal
        function openAbout() {
            const modal = document.getElementById('aboutModal');
            const data = getStoredData();
            const aboutDisplay = document.getElementById('aboutDisplay');
            aboutDisplay.textContent = data.about || "Click Edit to add your About Me section!";
            modal.classList.add('show');
        }

        function closeAbout() {
            const modal = document.getElementById('aboutModal');
            modal.classList.remove('show');
        }

        function enableAboutEdit() {
            const data = getStoredData();
            document.getElementById('aboutDisplay').style.display = 'none';
            document.getElementById('aboutTextarea').style.display = 'block';
            document.getElementById('aboutTextarea').value = data.about || '';
            document.getElementById('aboutEditContainer').innerHTML = '<button class="about-save-btn" onclick="disableAboutEdit()">Cancel</button>';
            document.getElementById('aboutSaveBtn').style.display = 'block';
        }

        function disableAboutEdit() {
            document.getElementById('aboutDisplay').style.display = 'block';
            document.getElementById('aboutTextarea').style.display = 'none';
            document.getElementById('aboutSaveBtn').style.display = 'none';
            document.getElementById('aboutEditContainer').innerHTML = '<button class="about-save-btn" onclick="enableAboutEdit()">Edit</button>';
        }

        function saveAbout() {
            const about = document.getElementById('aboutTextarea').value;
            const data = getStoredData();
            data.about = about;
            saveAllData(data);
            document.getElementById('aboutDisplay').textContent = about || "No content yet";
            disableAboutEdit();
            alert('About Me saved!');
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            const motivationalModal = document.getElementById('motivationalModal');
            const aboutModal = document.getElementById('aboutModal');
            if (event.target === motivationalModal) {
                motivationalModal.classList.remove('show');
            }
            if (event.target === aboutModal) {
                aboutModal.classList.remove('show');
            }
        }

        // Daily Notes
        function loadDailyNotes() {
            const quote = getRandomQuote();
            document.getElementById('dailyQuote').textContent = `"${quote}"`;
        }

        // Create subject notes
        function createSubjectNotes() {
            const data = getStoredData();
            const notesSection = document.getElementById('notesSection');
            notesSection.innerHTML = subjects.map(subject => {
                const key = subject.title;
                const content = data.notes[key] || '';
                return `
                    <div class="note">
                        <h3>${subject.emoji} ${subject.title}</h3>
                        <textarea id="note-${key}" placeholder="Click to edit your notes...">${content}</textarea>
                        <button class="save-btn" onclick="saveSubjectNote('${key}')">Save</button>
                    </div>
                `;
            }).join('');
        }

        function saveSubjectNote(subject) {
            const data = getStoredData();
            const content = document.getElementById(`note-${subject}`).value;
            data.notes[subject] = content;
            saveAllData(data);
            alert('Notes saved!');
        }

        // Create calendar
        function createAllMonths() {
            const pagesContainer = document.getElementById('calendarPages');
            const data = getStoredData();
            pagesContainer.innerHTML = '';

            for (let month = 0; month < 12; month++) {
                const monthPage = document.createElement('div');
                monthPage.className = 'month-page';
                monthPage.id = `month-${month}`;
                if (month === currentMonth) {
                    monthPage.classList.add('active');
                }

                const monthCalendar = document.createElement('div');
                monthCalendar.className = 'month-calendar';

                const monthTitle = document.createElement('h2');
                monthTitle.textContent = months[month];
                monthCalendar.appendChild(monthTitle);

                // Weekday headers
                const weekdaysDiv = document.createElement('div');
                weekdaysDiv.className = 'weekdays';
                const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                weekdays.forEach(day => {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'weekday';
                    dayDiv.textContent = day;
                    weekdaysDiv.appendChild(dayDiv);
                });
                monthCalendar.appendChild(weekdaysDiv);

                // Days
                const daysDiv = document.createElement('div');
                daysDiv.className = 'days';

                const firstDay = new Date(currentYear, month, 1).getDay();
                
                for (let i = 0; i < firstDay; i++) {
                    const emptyDiv = document.createElement('div');
                    emptyDiv.className = 'day empty';
                    daysDiv.appendChild(emptyDiv);
                }

                for (let day = 1; day <= daysInMonth[month]; day++) {
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day';

                    const dateKey = `${currentYear}-${month}-${day}`;
                    const taskData = data.tasks[dateKey];

                    // Check if today
                    if (today.getFullYear() === currentYear && today.getMonth() === month && today.getDate() === day) {
                        dayDiv.classList.add('today');
                    }

                    const emoji = document.createElement('span');
                    emoji.className = 'emoji';
                    emoji.textContent = taskData?.emoji || getRandomEmoji();
                    dayDiv.appendChild(emoji);

                    const dayNumber = document.createElement('div');
                    dayNumber.className = 'day-number';
                    dayNumber.textContent = day;
                    dayDiv.appendChild(dayNumber);

                    dayDiv.addEventListener('click', () => {
                        showMotivational();
                        const note = prompt(`Enter task for ${months[month]} ${day}:`);
                        if (note !== null) {
                            data.tasks[dateKey] = {
                                emoji: taskData?.emoji || emoji.textContent,
                                note: note
                            };
                            saveAllData(data);
                            alert(`Task saved: "${note}"`);
                        }
                    });

                    daysDiv.appendChild(dayDiv);
                }

                monthCalendar.appendChild(daysDiv);
                monthPage.appendChild(monthCalendar);
                pagesContainer.appendChild(monthPage);
            }
        }

        // Month selector
        function createMonthSelector() {
            const selector = document.getElementById('monthSelector');
            for (let i = 0; i < 12; i++) {
                const btn = document.createElement('button');
                btn.className = 'month-btn';
                btn.textContent = months[i].substring(0, 3);
                if (i === currentMonth) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => goToMonth(i));
                selector.appendChild(btn);
            }
        }

        function goToMonth(monthIndex) {
            const pages = document.querySelectorAll('.month-page');
            const buttons = document.querySelectorAll('.month-btn');
            
            pages.forEach(page => page.classList.remove('active'));
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`month-${monthIndex}`).classList.add('active');
            buttons[monthIndex].classList.add('active');
            currentMonth = monthIndex;
        }

        function nextMonth() {
            currentMonth = (currentMonth + 1) % 12;
            if (currentMonth === 0) {
                currentYear++;
                createAllMonths();
                updateCalendarTitle();
            }
            goToMonth(currentMonth);
        }

        function previousMonth() {
            currentMonth = (currentMonth - 1 + 12) % 12;
            if (currentMonth === 11) {
                currentYear--;
                createAllMonths();
                updateCalendarTitle();
            }
            goToMonth(currentMonth);
        }

        function goToCurrentMonth() {
            currentYear = new Date().getFullYear();
            currentMonth = new Date().getMonth();
            createAllMonths();
            updateCalendarTitle();
            goToMonth(currentMonth);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('todayDate').textContent = `${monthNames[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()}`;
            
            const data = getStoredData();
            document.getElementById('titleDisplay').textContent = data.title || "Lucky's Space";
            
            createAllMonths();
            createMonthSelector();
            createSubjectNotes();
            loadDailyNotes();
            updateCalendarTitle();
        });
    </script>
</body>
</html>
